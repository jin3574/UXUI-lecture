<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script></script>
    <style>
      .box {
        width: 400px;
        height: 250px;
        border: 2px solid black;
        position: relative;
        padding: 10px;
      }
      .round1 {
        position: absolute;
        width: 100px;
        height: 100px;
        background-color: red;
        border-radius: 50%;
      }
      .round2 {
        position: absolute;
        width: 100px;
        height: 100px;
        background-color: green;
        border-radius: 50%;
        right: 10px;
      }
      .round3 {
        position: absolute;
        width: 100px;
        height: 100px;
        background-color: yellow;
        border-radius: 50%;
        bottom: 10px;
      }
      .round4 {
        position: absolute;
        width: 100px;
        height: 100px;
        background-color: blue;
        border-radius: 50%;
        right: 10px;
        bottom: 10px;
      }
    </style>
  </head>

  <body>
    <h1>절대 위치를 사용한 요소 배치</h1>
    <div class="box">
      <div class="round1"></div>
      <div class="round2"></div>
      <div class="round3"></div>
      <div class="round4"></div>
    </div>
    <h1>안녕하세요?</h1>
  </body>
</html>
