<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>justify-content</title>
    <style>
      .container1 {
        border: 1px solid black;
        display: flex;
        /* flex-direction 생략시 row (주축방향: 가로) */
        justify-content: flex-start;
      }
      .container2 {
        border: 1px solid black;
        display: flex;
        justify-content: flex-end;
      }
      .container3 {
        border: 1px solid black;
        display: flex;
        justify-content: center;
      }
      .container4 {
        border: 1px solid black;
        display: flex;
        justify-content: space-between;
      }
      .container5 {
        border: 1px solid black;
        display: flex;
        justify-content: space-around;
      }
      .container6 {
        border: 1px solid black;
        display: flex;
        justify-content: space-evenly;
      }
      .item {
        padding: 5px 45px;
        margin: 5px;
      }
      .item1 {
        background: red;
      }
      .item2 {
        background: orange;
      }
      .item3 {
        background: yellow;
      }
      .item4 {
        background: green;
      }
      .item5 {
        background: blue;
      }
    </style>
  </head>

  <body>
    <h1>justify-content: flex-start (default)</h1>
    <div class="container1">
      <div class="item item1"><p>1</p></div>
      <div class="item item2"><p>2</p></div>
      <div class="item item3"><p>3</p></div>
      <div class="item item4"><p>4</p></div>
      <div class="item item5"><p>5</p></div>
    </div>
    <h1>justify-content: flex-end</h1>
    <div class="container2">
      <div class="item item1"><p>1</p></div>
      <div class="item item2"><p>2</p></div>
      <div class="item item3"><p>3</p></div>
      <div class="item item4"><p>4</p></div>
      <div class="item item5"><p>5</p></div>
    </div>
    <h1>justify-content: center</h1>
    <div class="container3">
      <div class="item item1"><p>1</p></div>
      <div class="item item2"><p>2</p></div>
      <div class="item item3"><p>3</p></div>
      <div class="item item4"><p>4</p></div>
      <div class="item item5"><p>5</p></div>
    </div>
    <h1>justify-content: space-between</h1>
    <div class="container4">
      <div class="item item1"><p>1</p></div>
      <div class="item item2"><p>2</p></div>
      <div class="item item3"><p>3</p></div>
      <div class="item item4"><p>4</p></div>
      <div class="item item5"><p>5</p></div>
    </div>
    <h1>justify-content: space-around</h1>
    <div class="container5">
      <div class="item item1"><p>1</p></div>
      <div class="item item2"><p>2</p></div>
      <div class="item item3"><p>3</p></div>
      <div class="item item4"><p>4</p></div>
      <div class="item item5"><p>5</p></div>
    </div>
    <h1>justify-content: space-evenly</h1>
    <div class="container6">
      <div class="item item1"><p>1</p></div>
      <div class="item item2"><p>2</p></div>
      <div class="item item3"><p>3</p></div>
      <div class="item item4"><p>4</p></div>
      <div class="item item5"><p>5</p></div>
    </div>
  </body>
</html>
